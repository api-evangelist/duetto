aid: duetto
name: Duetto
description: >-
  Duetto is a San Francisco–headquartered hospitality technology company
  providing a cloud-based Revenue and Profit Operating System (RP-OS) for
  hotels, casinos, resorts, and independent properties. Duetto's platform
  combines dynamic pricing, demand forecasting, group business optimization,
  benchmarking, and reporting to help hospitality operators optimize room
  rates, profitability, and total revenue performance. Core products include
  GameChanger (real-time dynamic pricing engine), ScoreBoard (forecasting and
  reporting dashboard), BlockBuster (group business optimization),
  Advance (AI-powered demand forecasting), HotStats (profitability
  benchmarking), and GameTime (select-service hotel revenue management).
  Duetto serves over 7,500 properties in more than 100 countries, with
  customers including Meliá, Sonesta, Virgin Hotels, and Sandman Hotel Group.
  Duetto integrates with major property management systems (PMS), central
  reservation systems (CRS), booking engines, and channel managers including
  Cloudbeds, Oracle OPERA / OHIP, Mews, Sabre, Amadeus, SiteMinder, and Infor.
  Duetto exposes an Open API for technical integration partners but does not
  publish a public, self-serve developer portal or OpenAPI specification —
  API access is partner-only and gated through a structured onboarding
  process with a self-testing toolkit. Revenue is generated through SaaS
  subscriptions to its revenue management products.
